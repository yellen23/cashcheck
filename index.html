<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#1D9E75">
<title>가계부</title>
<link rel="manifest" href="#" id="manifest-link">
<link rel="apple-touch-icon" href="icon.png">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FAFAFA;color:#1a1a1a;touch-action:manipulation}
:root{
  --green:#1D9E75;--green-dark:#0F6E56;--green-light:#E1F5EE;
  --red:#D85A30;--red-dark:#993C1D;--red-light:#FAECE7;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --border:#e5e5e0;--bg:#ffffff;--bg2:#f5f5f0;--bg3:#eeeee8;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --radius:12px;--radius-sm:8px;
  --color-purple:#6C47D8;--color-purple-light:#F0EEFF;--color-bg-page:#FAFAFA;
}
@media(prefers-color-scheme:dark){
  :root{--border:#2a2a2a;--bg:#1c1c1e;--bg2:#111111;--bg3:#2c2c2e;--text:#f0f0f0;--text2:#aaa;--text3:#666;}
  body{background:#111}
}

.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:#FAFAFA}
.header{background:#fff;border-bottom:0.5px solid #EDEDF0;padding:12px 16px 0;flex-shrink:0;padding-top:env(safe-area-inset-top,12px);position:relative}
.header-top{display:flex;flex-direction:row;justify-content:space-between;align-items:center;margin-bottom:8px}
.header-actions{display:flex;gap:6px;align-items:center}
.header h1{font-size:20px;font-weight:600;color:#B8860B}
.month-nav{display:flex;align-items:center;gap:8px;justify-content:center;width:100%;padding-bottom:8px}
.month-nav button{background:none;border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 10px;cursor:pointer;font-size:14px;color:var(--text);min-width:36px;min-height:36px}
.month-nav button:active{background:var(--bg3)}
#month-label{font-size:22px;font-weight:800;color:#6C47D8;min-width:90px;text-align:center}
.nav-tabs{display:flex;gap:2px;background:var(--bg3);border-radius:10px;padding:3px;margin-bottom:0}
.nav-tab{flex:1;text-align:center;padding:7px 2px;font-size:11px;border-radius:8px;cursor:pointer;color:var(--text2);border:none;background:none;font-family:inherit;font-weight:400;min-height:34px}
.nav-tab.active{background:var(--bg);color:#6C47D8;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px 90px}

.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.summary-card{background:#fff;border:0.5px solid #EDEDF0;border-radius:12px;padding:14px}
.summary-card.full{grid-column:1/-1}
.s-label{font-size:10px;color:#AAAAAA;margin-bottom:5px;letter-spacing:.3px}
.s-value{font-size:18px;font-weight:700}
.s-value.income{color:#E03E3E}
.s-value.expense{color:#2B6BDB}
.s-value.saving{color:var(--blue)}
.s-value.invest{color:#E07800}
.s-delta{font-size:11px;margin-top:4px}
.delta-up{color:var(--red-dark)}.delta-down{color:var(--green-dark)}

.bar-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:12px}
.bar-row{margin-bottom:10px}
.bar-info{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-track{height:6px;background:#F0F0F4;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .4s ease}

.tx-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:10px}
.tx-day-header{padding:9px 14px;background:var(--bg3);font-size:12px;font-weight:600;color:var(--text2);display:flex;justify-content:space-between}
.tx-item{padding:11px 14px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.tx-item:last-child{border-bottom:none}
.tx-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:13px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.badge{font-size:10px;border-radius:4px;padding:1px 5px;font-weight:500}
.badge-fixed{background:var(--green-light);color:var(--green-dark)}
.badge-sav{background:#FAEEDA;color:#BA7517}
.tx-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.tx-amt{font-size:14px;font-weight:600}
.tx-amt.inc{color:#D85A30}
.tx-amt.exp{color:#185FA5}
.tx-amt.sav{color:#BA7517}
.del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:4px;min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center}
.del-btn:active{color:var(--red-dark)}

/* 검색 */
.search-wrap{display:flex;gap:8px;margin-bottom:12px;align-items:center}
.search-bar{display:flex;align-items:center;gap:8px;flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px}
.search-bar:focus-within{border-color:var(--green)}
.search-input{border:none;background:none;font-size:14px;color:var(--text);flex:1;font-family:inherit;outline:none;min-height:28px}
.search-input::placeholder{color:var(--text3)}
.search-clear{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0;line-height:1;display:flex;align-items:center}
.csv-btn{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;font-family:inherit;white-space:nowrap;min-height:44px}
.csv-btn:active{background:var(--bg3)}

.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}

.fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));right:20px;width:56px;height:56px;border-radius:28px;background:var(--green);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(29,158,117,.4);display:flex;align-items:center;justify-content:center;z-index:200;transition:transform .15s}
.fab:active{transform:scale(.94)}

.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.sheet-bg.open{display:flex}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom,0px));width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
.sheet h2{font-size:17px;font-weight:600;margin-bottom:16px}
.type-toggle{display:flex;gap:6px;margin-bottom:16px}
.type-btn{flex:1;padding:10px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;text-align:center;font-size:14px;background:none;color:var(--text2);font-family:inherit;min-height:44px}
.type-btn.active.expense{background:var(--red-light);border-color:var(--red);color:var(--red-dark);font-weight:600}
.type-btn.active.income{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600}
.type-btn.active.saving{background:#F5F3FF;border-color:#7C3AED;color:#5B21B6;font-weight:600}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
input[type=text],input[type=number],select{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;font-family:inherit;background:var(--bg);color:var(--text);-webkit-appearance:none;min-height:44px}
input:focus,select:focus{outline:none;border-color:var(--green)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.cat-btn{position:relative;padding:10px 4px;border:1px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-size:11px;background:var(--bg2);color:var(--text2);min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.cat-btn:active{opacity:.7}
.cat-btn.selected{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600}
.cat-btn .ci{font-size:20px}
/* 커스텀 카테고리 삭제 버튼 */
.cat-del-btn{position:absolute;top:3px;right:3px;width:16px;height:16px;background:rgba(0,0,0,.22);border:none;border-radius:50%;font-size:11px;line-height:1;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;padding:0;z-index:1}
.cat-del-btn:active{background:var(--red-dark)}
/* 카테고리 추가 버튼 */
.cat-add-btn{border-style:dashed;color:var(--text3);font-size:11px}
.cat-add-btn .ci{font-size:18px}
.submit-btn{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;min-height:50px;margin-top:8px}
.submit-btn:active{background:var(--green-dark)}

/* 비교 */
.comp-row{display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.comp-row:last-child{border-bottom:none}
.comp-cat{width:52px;font-size:11px;color:var(--text2);text-align:center}
.comp-bars{flex:1}
.comp-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:3px}
.comp-bar-label{font-size:9px;width:22px;color:var(--text3)}
.comp-bar-track{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.comp-bar-fill{height:100%;border-radius:4px}
.comp-bar-val{font-size:10px;width:38px;text-align:right;color:var(--text2)}
.comp-diff{font-size:11px;width:46px;text-align:right;font-weight:600}
.diff-up{color:var(--red-dark)}.diff-down{color:var(--green-dark)}

/* 예산 */
.budget-row{display:flex;align-items:center;gap:8px;padding:11px 0;border-bottom:0.5px solid var(--border)}
.budget-row:last-child{border-bottom:none}
.budget-cat{width:54px;font-size:11px;color:var(--text2);text-align:center;flex-shrink:0;line-height:1.5}
.budget-progress{flex:1;min-width:0}
.budget-track{height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;margin-bottom:5px}
.budget-fill{height:100%;border-radius:4px;transition:width .3s}
.budget-nums{display:flex;align-items:center;flex-wrap:wrap;gap:3px;font-size:11px;color:var(--text2)}
.budget-over-tag{background:var(--red-light);color:var(--red-dark);font-size:10px;font-weight:600;padding:1px 5px;border-radius:3px}
.budget-input-col{flex-shrink:0;width:86px}
.budget-input{width:100%!important;font-size:13px!important;padding:7px 8px!important;min-height:36px!important;text-align:right}

/* AI */
.ai-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px}
.ai-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.ai-badge{font-size:10px;background:var(--blue-light);color:var(--blue);border-radius:4px;padding:2px 7px;font-weight:600}
.ai-badge-rule{font-size:10px;background:var(--green-light);color:var(--green-dark);border-radius:4px;padding:2px 7px;font-weight:600}
.ai-item{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--border)}
.ai-item:last-child{border-bottom:none}
.ai-item-left{display:flex;align-items:center;gap:8px}
.ai-item-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.ai-item-name{font-size:13px;font-weight:500}
.ai-item-sub{font-size:11px;color:var(--text3)}
.ai-item-amt{font-size:13px;font-weight:600;color:var(--red-dark)}
.ai-item-conf{font-size:10px;color:var(--text3)}
.ai-loading{text-align:center;padding:24px;color:var(--text3);font-size:13px;line-height:1.8}

/* API 키 */
.api-setup{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.api-setup p{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.6}
.api-setup a{color:var(--blue);text-decoration:none}
.api-key-row{display:flex;gap:8px}
.api-key-row input{flex:1}
.save-key-btn{padding:10px 14px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}

/* 예산 초과 경고 */
.warn-banner{background:var(--red-light);border:0.5px solid var(--red);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
.warn-title{font-size:13px;font-weight:600;color:var(--red-dark);margin-bottom:6px}
.warn-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:3px 0}
.warn-amt{color:var(--red-dark);font-weight:600}

/* 달력 */
.cal-btn{width:32px;height:32px;border-radius:10px;background:#F5F5F7;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.cal-btn.open{background:var(--color-purple-light);border:1.5px solid var(--color-purple)}
#cal-toggle-btn{font-size:18px}
.cal-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 8px;margin-bottom:14px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-head{text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0}
.cal-cell{min-height:52px;padding:3px 2px;border:0.5px solid var(--border);border-radius:4px;display:flex;flex-direction:column;align-items:center;background:var(--bg)}
.cal-cell.empty{background:var(--bg3);border-color:transparent}
.cal-day{font-size:11px;font-weight:500;color:var(--text);margin-bottom:1px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.cal-day.today{background:var(--green);color:#fff}
.cal-amt{font-size:9px;font-weight:600;line-height:1.4;text-align:center;width:100%}
.cal-inc{color:#D85A30}.cal-exp{color:#185FA5}.cal-sav{color:#BA7517}
.cal-cell.cal-selected{background:var(--green-light);border-color:var(--green)}

/* 커스텀 카테고리 팝업 */
.popup-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px)}
.popup-bg.open{display:flex}
.popup{background:var(--bg);border-radius:var(--radius);padding:20px;width:100%;max-width:280px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
.popup-title{font-size:16px;font-weight:600;margin-bottom:16px;text-align:center}
.popup-emoji-input{text-align:center!important;font-size:26px!important;padding:8px!important;letter-spacing:0}
/* 날짜 피커 */
.date-picker-wrap{position:relative}
.date-display-row{display:flex;align-items:center;gap:6px}
.date-display{flex:1;padding:11px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:15px;background:var(--bg);color:var(--text);cursor:pointer;min-height:44px;display:flex;align-items:center;user-select:none;-webkit-user-select:none}
.date-display.open{border-color:var(--green)}
.date-arrows{display:flex;flex-direction:column;gap:2px;flex-shrink:0}
.date-arrows button{background:var(--bg3);border:1px solid var(--border);border-radius:4px;width:28px;height:20px;cursor:pointer;font-size:9px;color:var(--text2);display:flex;align-items:center;justify-content:center;padding:0}
.date-arrows button:active{background:var(--border)}
.mini-cal-popup{position:fixed;z-index:700;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.18);padding:10px}
.mini-cal-nav{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:600;color:var(--text);margin-bottom:6px}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mini-cal-head{text-align:center;font-size:9px;font-weight:600;color:var(--text3);padding:2px 0}
.mini-cal-day{text-align:center;font-size:12px;padding:5px 0;border-radius:4px;cursor:pointer;color:var(--text);display:flex;align-items:center;justify-content:center;min-height:26px}
.mini-cal-day:not(.empty):hover{background:var(--bg3)}
.mini-cal-day.empty{cursor:default;pointer-events:none}
.mini-cal-day.sel{background:var(--green);color:#fff;font-weight:600}
.mini-cal-day.tod{outline:1.5px solid var(--green)}
/* 날짜 상세 팝업 */
.day-tx-item{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)}
.day-tx-item:last-child{border-bottom:none}
.day-edit-form{padding:10px 0;border-bottom:0.5px solid var(--border)}
.day-edit-form:last-child{border-bottom:none}
.day-tx-actions{display:flex;gap:4px;flex-shrink:0;margin-left:4px}
.day-btn{border-radius:4px;font-size:11px;padding:4px 7px;cursor:pointer;font-family:inherit;border:1px solid}
.day-edit-btn{background:var(--bg3);border-color:var(--border);color:var(--text2)}
.day-del-btn{background:var(--red-light);border-color:var(--red);color:var(--red-dark)}
.day-save-btn{background:var(--green-light);border-color:var(--green);color:var(--green-dark);font-weight:600}
.day-cancel-btn{background:var(--bg3);border-color:var(--border);color:var(--text2)}
/* 잠금 화면 */
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--text2);background:transparent;transition:.15s}
.pin-dot.filled{background:var(--green);border-color:var(--green)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px}
.pin-key{width:72px;height:72px;border-radius:36px;border:none;background:var(--bg3);font-size:24px;font-weight:400;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit}
.pin-key:active{opacity:.6}
.pin-key-empty{background:transparent!important;cursor:default;pointer-events:none}
.pin-key-del{font-size:20px}
/* 히어로 카드 */
.hero-card{background:linear-gradient(135deg,#6C47D8 0%,#9B6FF7 100%);border-radius:16px;padding:20px;margin:14px 0}
.hero-label{font-size:11px;color:rgba(255,255,255,.7);margin-bottom:6px}
.hero-amount{font-size:28px;font-weight:800;color:#fff;margin-bottom:4px}
.hero-sub{font-size:11px;color:rgba(255,255,255,.65)}
/* 입력 탭 */
.input-tabs{display:flex;border-bottom:1.5px solid #EDEDF0;margin:0 0 14px}
.input-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1.5px;padding:10px 4px;font-size:12px;font-weight:500;color:#999;cursor:pointer;font-family:inherit;transition:color .15s}
.input-tab.active{color:#6C47D8;font-weight:700;border-bottom-color:#6C47D8}
.input-tab-panel{display:block}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <h1>💰 Money Check</h1>
      <div class="header-actions">
        <button id="cal-toggle-btn" class="cal-btn" onclick="toggleCal()" aria-label="달력">📅</button>
        <button class="cal-btn" onclick="openSettings()" aria-label="설정">⚙️</button>
      </div>
    </div>
    <div class="month-nav">
      <button onclick="changeMonth(-1)" aria-label="이전달">‹</button>
      <span id="month-label">2026년 6월</span>
      <button onclick="changeMonth(1)" aria-label="다음달">›</button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('overview',this)">요약</button>

<script>
// ── 기본 카테고리 상수 ─────────────────────────────────────────────
const CAT_ICON={'식비':'🍽️','운동':'💪','취미':'🎯','경조사':'🎁','쇼핑':'🛍️','생활물품':'🧴','관리비':'🏢','월세':'🏠','교통':'🚌','기타':'📝','월급':'💼','부가수입':'💰','용돈':'🧧','기타수입':'📥','주식':'📈','펀드':'📊','적금':'🏦','예금':'💵','코인':'🪙','기타투자':'💎'};
const CAT_COLOR={'식비':'#1D9E75','운동':'#185FA5','취미':'#BA7517','경조사':'#D4537E','쇼핑':'#7F77DD','생활물품':'#888780','관리비':'#378ADD','월세':'#D85A30','교통':'#639922','기타':'#5F5E5A','월급':'#0F6E56','부가수입':'#0C447C','용돈':'#3B6D11','기타수입':'#444441','주식':'#7C3AED','펀드':'#2563EB','적금':'#0F766E','예금':'#B45309','코인':'#9333EA','기타투자':'#1D4ED8'};
const CAT_BG={'식비':'#E1F5EE','운동':'#E6F1FB','취미':'#FAEEDA','경조사':'#FBEAF0','쇼핑':'#EEEDFE','생활물품':'#F1EFE8','관리비':'#E6F1FB','월세':'#FAECE7','교통':'#EAF3DE','기타':'#F1EFE8','월급':'#E1F5EE','부가수입':'#E6F1FB','용돈':'#EAF3DE','기타수입':'#F1EFE8','주식':'#F5F3FF','펀드':'#EFF6FF','적금':'#F0FDFA','예금':'#FFFBEB','코인':'#FAF5FF','기타투자':'#EFF6FF'};
const BASE_EXP=['식비','운동','취미','경조사','쇼핑','생활물품','관리비','월세','교통','기타'];
const BASE_INC=['월급','부가수입','용돈','기타수입'];
const BASE_SAV=['주식','펀드','적금','예금','코인','기타투자'];
// 커스텀 카테고리용 색상 팔레트
const CUST_COLORS=['#7C3AED','#0EA5E9','#EA580C','#059669','#DC2626','#D97706','#1D4ED8','#9D174D','#0F766E','#92400E'];
const CUST_BGS=['#F5F3FF','#E0F2FE','#FFF7ED','#ECFDF5','#FEF2F2','#FFFBEB','#EFF6FF','#FDF2F8','#F0FDFA','#FEF3C7'];

// ── 상태 ──────────────────────────────────────────────────────────
let year=2026,month=6,tab='overview',type='expense',cat='',searchQuery='',catPopupType='expense',calOpen=false,pickerDay=1,miniCalOpen=false,detailDay=null,lockPin='',lockMode='unlock',lockTempPin='',selectedCalDay=null;

// ── localStorage ──────────────────────────────────────────────────
function mkey(y,m){return `hb_${y}_${String(m).padStart(2,'0')}`}
function load(y,m){try{return JSON.parse(localStorage.getItem(mkey(y,m))||'[]')}catch{return[]}}
function save(y,m,data){localStorage.setItem(mkey(y,m),JSON.stringify(data))}
function getApiKey(){return localStorage.getItem('hb_api_key')||''}
function saveApiKey(k){localStorage.setItem('hb_api_key',k)}
function loadBudgets(){try{return JSON.parse(localStorage.getItem('hb_budgets')||'{}')}catch{return{}}}
function saveBudgets(b){localStorage.setItem('hb_budgets',JSON.stringify(b))}
function loadCustomCats(t){try{return JSON.parse(localStorage.getItem(`hb_custom_${t}`)||'[]')}catch{return[]}}
function saveCustomCats(t,cats){localStorage.setItem(`hb_custom_${t}`,JSON.stringify(cats))}

function allData(){
  const skip=new Set(['hb_api_key','hb_budgets','hb_custom_expense','hb_custom_income','hb_custom_saving']);
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('hb_')&&!skip.has(k));
  const db={};
  keys.forEach(k=>{try{db[k]=JSON.parse(localStorage.getItem(k)||'[]')}catch{db[k]=[]}});
  return db;
}

// ── 카테고리 메타 헬퍼 ─────────────────────────────────────────────
function hashStr(s){let h=0;for(let i=0;i<s.length;i++)h=(Math.imul(31,h)+s.charCodeAt(i))|0;return Math.abs(h)}

function catIcon(name){
  if(CAT_ICON[name])return CAT_ICON[name];
  const found=[...loadCustomCats('expense'),...loadCustomCats('income')].find(c=>c.name===name);
  return found?found.icon:'📝';
}
function catColor(name){
  if(CAT_COLOR[name])return CAT_COLOR[name];
  return CUST_COLORS[hashStr(name)%CUST_COLORS.length];
}
function catBg(name){
  if(CAT_BG[name])return CAT_BG[name];
  return CUST_BGS[hashStr(name)%CUST_BGS.length];
}

function getAllExpCats(){return[...BASE_EXP,...loadCustomCats('expense').map(c=>c.name)]}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── 유틸 ──────────────────────────────────────────────────────────
function fmt(n){return Number(n).toLocaleString('ko-KR')+'원'}
function fmtS(n){const a=Math.abs(n);if(a>=100000000)return(n/100000000).toFixed(1)+'억';if(a>=10000)return parseFloat((n/10000).toFixed(1))+'만';return Number(n).toLocaleString('ko-KR')}
function prevMonth(){let m=month-1,y=year;if(m<1){m=12;y--}return{y,m}}

function isFixed(tx,allDb){
  const months=Object.keys(allDb).filter(k=>allDb[k].some(t=>t.cat===tx.cat&&t.type===tx.type&&Math.abs(t.amount-tx.amount)/Math.max(tx.amount,1)<0.2));
  return months.length>=2;
}

function catTotals(y,m){
  const t={};
  load(y,m).filter(x=>x.type==='expense').forEach(x=>{t[x.cat]=(t[x.cat]||0)+x.amount});
  return t;
}
function savTotals(y,m){
  const t={};
  load(y,m).filter(x=>x.type==='saving').forEach(x=>{t[x.cat]=(t[x.cat]||0)+x.amount});
  return t;
}

function highlight(text,query){
  if(!query||!text)return text||'';
  const idx=text.indexOf(query);
  if(idx<0)return text;
  return text.slice(0,idx)+`<mark style="background:var(--green-light);color:var(--green-dark);border-radius:2px;padding:0 1px">${text.slice(idx,idx+query.length)}</mark>`+text.slice(idx+query.length);
}

// ── 커스텀 카테고리 그리드 ─────────────────────────────────────────
function refreshCatGrids(){
  buildCatGrid('cat-expense','expense',BASE_EXP,true);
  buildCatGrid('cat-income','income',BASE_INC,true);
  buildCatGrid('cat-saving','saving',BASE_SAV,true);
  if(cat){
    const btn=document.querySelector(`.cat-btn[data-cat="${esc(cat)}"]`);
    if(btn)btn.classList.add('selected');
  }
}

function buildCatGrid(gridId,t,baseCats,allowCustom=true){
  const grid=document.getElementById(gridId);
  if(!grid)return;

  const baseBtns=baseCats.map(name=>`
    <div class="cat-btn" data-cat="${esc(name)}" onclick="selCat(this)">
      <span class="ci">${catIcon(name)}</span>${esc(name)}
    </div>`).join('');

  let extra='';
  if(allowCustom){
    const custom=loadCustomCats(t);
    extra=custom.map(c=>`
      <div class="cat-btn cat-custom" data-cat="${esc(c.name)}" onclick="selCat(this)">
        <button class="cat-del-btn" data-cattype="${t}" data-catname="${esc(c.name)}" onclick="delCustomCatBtn(this,event)" aria-label="삭제">×</button>
        <span class="ci">${c.icon||'📌'}</span>${esc(c.name)}
      </div>`).join('');
    extra+=`<div class="cat-btn cat-add-btn" onclick="openCatPopup('${t}')"><span class="ci">＋</span>추가</div>`;
  }

  grid.innerHTML=baseBtns+extra;
}

function openCatPopup(t){
  catPopupType=t;
  document.getElementById('cp-emoji').value='';
  document.getElementById('cp-name').value='';
  document.getElementById('cat-popup-bg').classList.add('open');
  setTimeout(()=>document.getElementById('cp-emoji').focus(),80);
}

function closeCatPopup(e){
  if(!e||e.target===document.getElementById('cat-popup-bg'))
    document.getElementById('cat-popup-bg').classList.remove('open');
}

function saveCustomCat(){
  const emoji=document.getElementById('cp-emoji').value.trim()||'📌';
  const name=document.getElementById('cp-name').value.trim();
  if(!name){alert('이름을 입력해주세요');return}

  // 중복 검사
  const all=[...BASE_EXP,...BASE_INC,...BASE_SAV,...loadCustomCats('expense').map(c=>c.name),...loadCustomCats('income').map(c=>c.name)];
  if(all.includes(name)){alert('이미 있는 카테고리예요');return}

  const cats=loadCustomCats(catPopupType);
  cats.push({icon:emoji,name});
  saveCustomCats(catPopupType,cats);

  document.getElementById('cat-popup-bg').classList.remove('open');
  refreshCatGrids();

  // 저장 직후 새 카테고리 자동 선택
  const gridId=catPopupType==='expense'?'cat-expense':catPopupType==='income'?'cat-income':'cat-saving';
  const newBtn=document.getElementById(gridId)?.querySelector(`[data-cat="${esc(name)}"]`);
  if(newBtn)selCat(newBtn);
}

function delCustomCatBtn(el,event){
  event.stopPropagation();
  delCustomCat(el.dataset.cattype,el.dataset.catname);
}

function delCustomCat(t,name){
  const db=allData();
  const used=Object.values(db).flat().filter(tx=>tx.cat===name).length;
  const msg=used>0
    ?`"${name}"을 삭제하면 기존 내역 ${used}건의 아이콘이 기본값으로 바뀌어요. 삭제할까요?`
    :`"${name}" 카테고리를 삭제할까요?`;
  if(!confirm(msg))return;
  saveCustomCats(t,loadCustomCats(t).filter(c=>c.name!==name));
  if(cat===name)cat='';
  refreshCatGrids();
}

// ── 규칙 기반 고정 지출 감지 ─────────────────────────────────────
function detectFixedExpenses(){
  const db=allData();
  const allKeys=Object.keys(db).sort();
  if(allKeys.length<2)return[];
  const catByMonth={};
  allKeys.forEach(mk=>{
    (db[mk]||[]).filter(t=>t.type==='expense').forEach(t=>{
      if(!catByMonth[t.cat])catByMonth[t.cat]={};
      catByMonth[t.cat][mk]=(catByMonth[t.cat][mk]||0)+t.amount;
    });
  });
  const fixed=[];
  Object.entries(catByMonth).forEach(([c,mData])=>{
    const months=Object.keys(mData);
    if(months.length<2)return;
    const amounts=months.map(m=>mData[m]);
    const avg=amounts.reduce((s,a)=>s+a,0)/amounts.length;
    if(avg===0)return;
    const maxDev=Math.max(...amounts.map(a=>Math.abs(a-avg)/avg));
    if(maxDev<0.3){
      const conf=Math.min(Math.round(months.length*20+(1-maxDev)*50),95);
      fixed.push({cat:c,amount:Math.round(avg),months:months.length,confidence:conf,deviation:Math.round(maxDev*100)});
    }
  });
  return fixed.sort((a,b)=>b.amount-a.amount);
}

function exportCSV(){
  const data=load(year,month);
  if(!data.length){alert('이번 달 내역이 없어요');return}
  const header='날짜,유형,카테고리,금액,메모';
  const rows=[...data].sort((a,b)=>a.day-b.day).map(t=>{
    const d=`${year}-${String(month).padStart(2,'0')}-${String(t.day).padStart(2,'0')}`;
    return`${d},${t.type==='income'?'수입':t.type==='saving'?'저축·투자':'지출'},${t.cat},${t.amount},${(t.memo||'').replace(/,/g,' ')}`;
  });
  const blob=new Blob(['﻿'+[header,...rows].join('\n')],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`가계부_${year}년${month}월.csv`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}

function renderOverview(){
  const data=load(year,month);
  const income=data.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense=data.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const invest=data.filter(t=>t.type==='saving').reduce((s,t)=>s+t.amount,0);
  const remain=income-expense-invest;
  const pm=prevMonth();
  const pmD=load(pm.y,pm.m);
  const pmInc=pmD.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const pmExp=pmD.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const dInc=income-pmInc,dExp=expense-pmExp;
  const incDelta=pmInc>0?`<span class="${dInc>=0?'delta-up':'delta-down'}">${dInc>=0?'▲':'▼'} ${fmtS(Math.abs(dInc))}</span> <span style="color:var(--text3)">전월 대비</span>`:'';
  const expDelta=pmExp>0?`<span class="${dExp>0?'delta-up':'delta-down'}">${dExp>0?'▲':'▼'} ${fmtS(Math.abs(dExp))}</span> <span style="color:var(--text3)">전월 대비</span>`:'';

  const budgets=loadBudgets();
  const tots=catTotals(year,month);
  const savTots=savTotals(year,month);
  const overList=Object.entries(tots).filter(([c,spent])=>budgets[c]&&spent>budgets[c]);
  const warnSection=overList.length?`
    <div class="warn-banner">
      <div class="warn-title">⚠️ 예산 초과 경고</div>
      ${overList.map(([c,spent])=>`<div class="warn-row"><span>${catIcon(c)} ${c}</span><span class="warn-amt">+${fmt(spent-budgets[c])} 초과</span></div>`).join('')}
    </div>`:'';

  const allBars=[
    ...Object.entries(tots).map(([c,a])=>({c,a,isSav:false})),
    ...Object.entries(savTots).map(([c,a])=>({c,a,isSav:true}))
  ].sort((x,y)=>y.a-x.a);
  const maxA=allBars.length?allBars[0].a:1;
  const bars=allBars.length
    ?allBars.map(({c,a,isSav})=>`<div class="bar-row"><div class="bar-info"><span>${catIcon(c)} ${c}${isSav?' <span class="badge badge-sav">저축</span>':''}</span><span style="color:var(--text2)">${isSav?'':'-'}${fmt(a)}</span></div><div class="bar-track"><div class="bar-fill" style="width:${Math.round(a/maxA*100)}%;background:${isSav?'#E07800':'#6C47D8'}"></div></div></div>`).join('')
    :'<p style="color:var(--text3);font-size:13px;text-align:center;padding:12px 0">지출 내역이 없어요</p>';

  const remainSub=remain<0?'지출·투자가 수입을 초과했어요':income>0?`수입의 ${Math.round(remain/income*100)}% 남음`:'';
  const savPct=income>0&&invest>0?`수입의 ${Math.round(invest/income*100)}%`:'';
  const calSection=calOpen?renderCalendar():'';
  if(selectedCalDay!==null)return calSection+renderDayTransactions(selectedCalDay);
  return calSection+warnSection+`
  <div class="hero-card">
    <div class="hero-label">이번 달 잔여금</div>

    <div class="summary-card"><div class="s-label">이번 달 수입</div><div class="s-value income">${fmt(income)}</div><div class="s-delta">${incDelta}</div></div>

function renderCompare(){
  const pm=prevMonth();
  const curr=catTotals(year,month),prev=catTotals(pm.y,pm.m);
  const cats=[...new Set([...Object.keys(curr),...Object.keys(prev)])];
  const cTotal=Object.values(curr).reduce((s,v)=>s+v,0);
  const pTotal=Object.values(prev).reduce((s,v)=>s+v,0);
  const diff=cTotal-pTotal;

  if(!cTotal&&!pTotal)return`<div class="empty-state"><div class="icon">📊</div><p>비교할 데이터가 없어요<br>내역을 먼저 입력해주세요</p></div>`;

  const topCard=`<div class="summary-card full" style="margin-bottom:14px">
    <div class="s-label">전월 대비 총 지출</div>
    <div class="s-value" style="font-size:18px">${diff===0?'변동 없음':`<span class="${diff>0?'delta-up':'delta-down'}">${diff>0?'▲':'▼'} ${fmt(Math.abs(diff))}</span>`}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">이번달 ${fmt(cTotal)} / 전월 ${fmt(pTotal)}</div>
  </div>`;

  const maxV=Math.max(...cats.map(c=>Math.max(curr[c]||0,prev[c]||0)),1);
  const rows=cats.sort((a,b)=>(curr[b]||0)-(curr[a]||0)).map(c=>{
    const cv=curr[c]||0,pv=prev[c]||0,d=cv-pv;
    return`<div class="comp-row">
      <div class="comp-cat">${catIcon(c)}<br>${c}</div>
      <div class="comp-bars">
        <div class="comp-bar-row"><span class="comp-bar-label" style="color:var(--blue)">이번</span><div class="comp-bar-track"><div class="comp-bar-fill" style="width:${Math.round(cv/maxV*100)}%;background:${catColor(c)}"></div></div><span class="comp-bar-val">${fmtS(cv)}</span></div>
        <div class="comp-bar-row"><span class="comp-bar-label">전월</span><div class="comp-bar-track"><div class="comp-bar-fill" style="width:${Math.round(pv/maxV*100)}%;background:#ccc"></div></div><span class="comp-bar-val">${fmtS(pv)}</span></div>
      </div>
      <div class="comp-diff ${d>0?'diff-up':d<0?'diff-down':''}">${d===0?'—':d>0?'▲'+fmtS(d):'▼'+fmtS(Math.abs(d))}</div>
    </div>`;
  }).join('');
  return topCard+`<div class="bar-wrap"><div class="section-title">카테고리별 전월 비교</div>${rows}</div>`;
}

// ── Claude AI 분석 ─────────────────────────────────────────────────
async function runAI(){
  const key=getApiKey();
  if(!key){alert('API 키를 먼저 저장해주세요');return}
  const btn=document.getElementById('ai-btn'),body=document.getElementById('ai-body');
  if(!btn||!body)return;
  btn.disabled=true;btn.textContent='분석 중...';
  body.innerHTML='⏳<br><br>AI가 패턴을 분석 중이에요...';
  const db=allData();
  const summary=Object.entries(db).map(([k,txs])=>`${k}: ${txs.map(t=>`${t.type}/${t.cat}/${t.amount}/${t.memo||''}`).join(', ')}`).join('\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:`가계부 데이터:\n${summary}\n\n2개월 이상 반복된 고정지출 패턴을 분석해서 다음 달 예측을 JSON으로만 응답해. 마크다운 없이 순수 JSON:\n{"predictions":[{"cat":"카테고리","amount":숫자,"confidence":0-100,"reason":"이유"}],"total":숫자,"summary":"한줄요약"}`}]})
    });
    const d=await res.json();
    if(d.error)throw new Error(d.error.message);
    const text=d.content.map(c=>c.text||'').join('').replace(/```json|```/g,'').trim();
    const parsed=JSON.parse(text);
    if(!parsed.predictions?.length){body.innerHTML='반복 패턴을 찾지 못했어요.<br>내역을 더 입력해보세요.';return}
    body.innerHTML=parsed.predictions.map(p=>`
      <div class="ai-item">
        <div class="ai-item-left">
          <div class="ai-item-icon" style="background:${catBg(p.cat)}">${catIcon(p.cat)}</div>
          <div><div class="ai-item-name">${p.cat}</div><div class="ai-item-sub">${p.reason}</div></div>
        </div>
        <div style="text-align:right"><div class="ai-item-amt">${fmt(p.amount)}</div><div class="ai-item-conf">신뢰도 ${p.confidence}%</div></div>
      </div>`).join('');
    const tc=document.getElementById('ai-total-card');if(tc)tc.style.display='';
    const at=document.getElementById('ai-total');if(at)at.textContent=fmt(parsed.total||0);
    const an=document.getElementById('ai-note');if(an)an.textContent=parsed.summary||'';
  }catch(e){
    body.innerHTML=`오류가 발생했어요.<br>${e.message}`;
  }finally{
    if(btn){btn.disabled=false;btn.textContent='✨ 다시 분석'}
  }
}

function renderCalendar(){
  const data=load(year,month);
  const now=new Date();
  const isCurMon=(year===now.getFullYear()&&month===now.getMonth()+1);
  const today=now.getDate();
  const firstDay=new Date(year,month-1,1).getDay();
  const daysInMonth=new Date(year,month,0).getDate();
  const dayData={};
  data.forEach(t=>{
    if(!dayData[t.day])dayData[t.day]={inc:0,exp:0,sav:0};
    if(t.type==='income')dayData[t.day].inc+=t.amount;
    else if(t.type==='expense')dayData[t.day].exp+=t.amount;
    else if(t.type==='saving')dayData[t.day].sav+=t.amount;
  });
  const heads=['일','월','화','수','목','금','토'].map(d=>`<div class="cal-head">${d}</div>`).join('');
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dd=dayData[d];
    const isToday=isCurMon&&d===today;
    const amts=dd?[
      dd.inc>0?`<div class="cal-amt cal-inc">+${fmtS(dd.inc)}</div>`:'',
      dd.exp>0?`<div class="cal-amt cal-exp">-${fmtS(dd.exp)}</div>`:'',
      dd.sav>0?`<div class="cal-amt cal-sav">◆${fmtS(dd.sav)}</div>`:'',
    ].join(''):'';
    const isSel=selectedCalDay===d;
    cells+=`<div class="cal-cell${isSel?' cal-selected':''}" onclick="selectCalDay(${d})" style="cursor:pointer"><div class="cal-day${isToday?' today':''}">${d}</div>${amts}</div>`;
  }
  return`<div class="cal-wrap"><div class="cal-grid">${heads}${cells}</div></div>`;
}

};

function guessCategory(merchant){
  if(!merchant)return '기타';
  for(const [c,kws] of Object.entries(categoryMap)){
    if(kws.some(k=>merchant.includes(k)))return c;
  }
  return '기타';
}

function parseCardMessage(text){
  const flat=text.replace(/\n/g,' ').replace(/\s+/g,' ');
  const results=[];
  // 신한/KB/삼성 패턴: N,NNN원 승인
  const approvalM=flat.match(/(\d{1,3}(?:,\d{3})*)원\s*승인/);
  if(approvalM){
    const amount=parseInt(approvalM[1].replace(/,/g,''));
    const after=flat.slice(flat.indexOf(approvalM[0])+approvalM[0].length);
    const mM=after.match(/[)\s]+([가-힣A-Za-z0-9·&\s]{2,15}?)(?:\s*잔액|\s*한도|$)/);
    const merchant=(mM?.[1]||'').trim()||'카드결제';
    const dateM=flat.match(/(\d{2})\/(\d{2})/);
    const day=dateM?parseInt(dateM[2]):new Date().getDate();
    results.push({amount,merchant,day,cat:guessCategory(merchant),type:'expense'});
    return results;
  }
  // 범용: 첫 번째 N원
  const allAmts=[...flat.matchAll(/(\d{1,3}(?:,\d{3})*)원/g)];
  if(allAmts.length){
    const m=allAmts[0];
    const amount=parseInt(m[1].replace(/,/g,''));
    const before=flat.slice(Math.max(0,m.index-30),m.index);
    const after=flat.slice(m.index+m[0].length,m.index+m[0].length+30);
    const mB=before.match(/([가-힣A-Za-z0-9·&]{2,15})\s*$/);
    const mA=after.match(/^\s*([가-힣A-Za-z0-9·&]{2,15})/);
    const merchant=(mA?.[1]||mB?.[1]||'카드결제').trim();
    const dateM=flat.match(/(\d{2})\/(\d{2})/);
    const day=dateM?parseInt(dateM[2]):new Date().getDate();
    results.push({amount,merchant,day,cat:guessCategory(merchant),type:'expense'});
  }
  return results;
}

function analyzeCardSms(){
  const text=document.getElementById('sms-text').value.trim();
  if(!text){alert('문자를 붙여넣어 주세요');return}
  _parsedItems=parseCardMessage(text);
  showParseResult(_parsedItems,'sms-result',false);
}

function detectAndParseCardApp(text){
  if(text.includes('거래내역조회')||/\d{4}\.\d{2}\.\d{2}/.test(text))return parseShinhanBank(text);
  if(/\d{1,2}일\([월화수목금토일]\)/.test(text))return parseKbank(text);
  return parseGeneric(text);
}

function parseShinhanBank(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const results=[];
  let currentDay=new Date().getDate();
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const dateM=line.match(/(\d{4})\.(\d{2})\.(\d{2})/);
    if(dateM){currentDay=parseInt(dateM[3]);continue}
    if(/\d{2}:\d{2}/.test(line)&&(line.includes('출금')||line.includes('입금'))){
      const txType=line.includes('입금')?'income':'expense';
      const merchant=(lines[i+1]||'').trim();
      const amtM=(lines[i+2]||'').match(/(\d{1,3}(?:,\d{3})*)원/);
      if(merchant&&amtM){
        results.push({amount:parseInt(amtM[1].replace(/,/g,'')),merchant,day:currentDay,cat:guessCategory(merchant),type:txType});
        i+=2;
      }
    }
  }
  return results;
}

function parseKbank(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const results=[];
  let currentDay=new Date().getDate();
  for(let i=0;i<lines.length;i++){
    const line=lines[i];
    const dateM=line.match(/(\d{1,2})일\([월화수목금토일]\)/);
    if(dateM){currentDay=parseInt(dateM[1]);continue}
    if(/^\d{1,2}:\d{2}$/.test(line)||line.includes('캐시백'))continue;
    const amtM=line.match(/^(\d{1,3}(?:,\d{3})*)원$/);
    if(amtM&&i>0){
      const merchant=lines[i-1]?.trim()||'';
      if(merchant&&!/^\d{1,2}:\d{2}$/.test(merchant)&&!merchant.includes('캐시백')){
        results.push({amount:parseInt(amtM[1].replace(/,/g,'')),merchant,day:currentDay,cat:guessCategory(merchant),type:'expense'});
      }
    }
  }
  return results;
}

function parseGeneric(text){
  const results=[];
  const amtRe=/(\d{1,3}(?:,\d{3})*)원/g;
  let m;
  while((m=amtRe.exec(text))!==null){
    const amount=parseInt(m[1].replace(/,/g,''));
    if(amount<500)continue;
    const before=text.slice(Math.max(0,m.index-25),m.index);
    const after=text.slice(m.index+m[0].length,m.index+m[0].length+25);
    const mB=before.match(/([가-힣A-Za-z0-9·&]{2,15})\s*$/);
    const mA=after.match(/^\s*([가-힣A-Za-z0-9·&]{2,15})/);
    const merchant=(mA?.[1]||mB?.[1]||'').trim();
    if(!merchant)continue;
    results.push({amount,merchant,day:new Date().getDate(),cat:guessCategory(merchant),type:'expense'});
    if(results.length>=10)break;
  }
  return results;
}

function onOcrFileChange(e){
  _ocrFile=e.target.files[0];
  if(!_ocrFile)return;
  const url=URL.createObjectURL(_ocrFile);
  document.getElementById('ocr-preview').innerHTML=`<img src="${url}" style="max-width:100%;max-height:160px;border-radius:8px;border:1px solid var(--border)">`;
  document.getElementById('ocr-btn').style.display='';
  document.getElementById('ocr-result').innerHTML='';
  document.getElementById('ocr-status').innerHTML='';
}

async function preprocessImage(file){
  return new Promise((resolve)=>{
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const scale=Math.min(2,1500/Math.max(img.width,img.height));
      canvas.width=img.width*scale;
      canvas.height=img.height*scale;
      const ctx=canvas.getContext('2d');
      ctx.filter='contrast(1.4) brightness(1.1)';
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      canvas.toBlob(resolve,'image/png');
      URL.revokeObjectURL(url);
    };
    img.src=url;
  });
}

async function runOcr(){
  if(!_ocrFile)return;
  const status=document.getElementById('ocr-status');
  const btn=document.getElementById('ocr-btn');
  btn.disabled=true;
  if(!document.getElementById('_spin_css')){
    const s=document.createElement('style');
    s.id='_spin_css';
    s.textContent='@keyframes _spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(s);
  }
  status.innerHTML='<span style="display:inline-block;width:14px;height:14px;border:2px solid #6C47D8;border-top-color:transparent;border-radius:50%;animation:_spin .8s linear infinite;vertical-align:middle;margin-right:6px"></span>이미지 분석 중...';
  try{
    const processed=await preprocessImage(_ocrFile);
    const result=await Tesseract.recognize(processed,'kor+eng',{tessedit_pageseg_mode:'6'});
    console.log('[OCR raw]',result.data.text);
    _ocrItems=detectAndParseCardApp(result.data.text);
    status.innerHTML='';
    if(!_ocrItems.length){
      status.innerHTML='<p style="color:#999;font-size:13px">내역을 찾지 못했습니다. 문자 붙여넣기 탭을 이용해보세요</p>';
    }else{
      showParseResult(_ocrItems,'ocr-result',true);
    }
  }catch(err){
    console.error('[OCR error]',err);
    status.innerHTML='<p style="color:#DC2626;font-size:13px">분석 실패. 다시 시도해주세요</p>';
  }finally{
    btn.disabled=false;
    btn.textContent='다시 추출';
  }
}

function showParseResult(items,containerId,isMultiple){
  const el=document.getElementById(containerId);
  if(!items||!items.length){
    el.innerHTML='<p style="color:#999;font-size:13px;text-align:center;padding:16px">인식된 내역이 없습니다</p>';
    return;
  }
  const rows=items.map((item,idx)=>`
    <div style="display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border)">
      ${isMultiple?`<input type="checkbox" data-idx="${idx}" class="parse-check" checked style="width:16px;height:16px;flex-shrink:0;accent-color:#6C47D8">`:''}
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(item.merchant)}</div>
        <div style="font-size:11px;color:#999">${month}월 ${item.day}일</div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:14px;font-weight:700;color:${item.type==='income'?'#1D9E75':'#2B6BDB'}">${item.type==='income'?'+':'-'}${fmt(item.amount)}</div>
        <span style="font-size:10px;background:#F0EEFF;color:#6C47D8;border-radius:99px;padding:2px 8px;font-weight:500">${esc(item.cat)}</span>
      </div>
    </div>`).join('');
  const src=containerId==='sms-result'?'sms':'ocr';
  const saveArea=isMultiple
    ?`<div style="padding:10px 0 4px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);margin-bottom:10px;cursor:pointer">
          <input type="checkbox" onchange="toggleAllChecks('${containerId}',this.checked)" checked style="accent-color:#6C47D8"> 전체선택
        </label>
        <button onclick="saveParsedItems('${src}')" class="submit-btn" style="font-size:14px">선택 항목 저장</button>
      </div>`
    :`<button onclick="saveParsedItems('${src}')" class="submit-btn" style="margin-top:10px;font-size:14px">저장</button>`;
  el.innerHTML=rows+saveArea;
}

function toggleAllChecks(containerId,checked){
  document.querySelectorAll(`#${containerId} .parse-check`).forEach(cb=>cb.checked=checked);
}

function saveParsedItems(src){
  const items=src==='sms'?_parsedItems:_ocrItems;
  const containerId=src+'-result';
  const checks=document.querySelectorAll(`#${containerId} .parse-check`);
  const toSave=checks.length?items.filter((_,i)=>checks[i]?.checked):items;
  if(!toSave.length){showToast('선택된 항목이 없어요');return}
  const data=load(year,month);
  toSave.forEach(item=>{
    data.push({day:item.day,amount:item.amount,cat:item.cat,memo:item.merchant,type:item.type,id:Date.now()+Math.random()});
  });
  save(year,month,data);
  document.getElementById('sheet-bg').classList.remove('open');
  render();
  showToast(`${toSave.length}건 저장되었습니다`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.style.display='block';
  clearTimeout(t._tid);
  t._tid=setTimeout(()=>{t.style.display='none'},2200);
}

// ── 설정 & 잠금 ─────────────────────────────────────────────────────
function loadPin(){return localStorage.getItem('hb_pin')||''}
function savePin(p){localStorage.setItem('hb_pin',p)}
function clearPin(){localStorage.removeItem('hb_pin')}

const LOCK_TITLE={'unlock':'잠금 해제','setpin-1':'새 PIN 입력','setpin-2':'PIN 확인','change-old':'현재 PIN 입력','change-1':'새 PIN 입력','change-2':'새 PIN 확인','remove':'PIN 입력 확인'};

function showLockScreen(mode,fromSettings){
  lockMode=mode;lockPin='';
  document.getElementById('lock-title').textContent=LOCK_TITLE[mode]||'PIN 입력';
  renderLockDots();
  document.getElementById('lock-error').textContent='';
  document.getElementById('lock-cancel').style.display=fromSettings?'block':'none';
  document.getElementById('lock-screen').style.display='flex';
}

function renderLockDots(){
  document.querySelectorAll('.pin-dot').forEach((d,i)=>d.classList.toggle('filled',i<lockPin.length));
}

function lockKeyPress(key){
  if(key==='del'){lockPin=lockPin.slice(0,-1);renderLockDots();return}
  if(lockPin.length>=4)return;
  lockPin+=key;renderLockDots();
  if(lockPin.length===4)setTimeout(handlePinComplete,80);
}

function handlePinComplete(){
  const stored=loadPin();
  const errEl=document.getElementById('lock-error');
  const onErr=msg=>{if(errEl)errEl.textContent=msg;setTimeout(()=>{lockPin='';renderLockDots();if(errEl)errEl.textContent='';},900)};
  const backToSettings=()=>{document.getElementById('lock-screen').style.display='none';renderSettings();document.getElementById('settings-bg').classList.add('open')};
  switch(lockMode){
    case'unlock':lockPin===stored?document.getElementById('lock-screen').style.display='none':onErr('잘못된 PIN이에요');break;
    case'setpin-1':lockTempPin=lockPin;showLockScreen('setpin-2',true);break;
    case'setpin-2':lockPin===lockTempPin?(savePin(lockPin),backToSettings()):onErr('PIN이 일치하지 않아요');break;
    case'change-old':lockPin===stored?showLockScreen('change-1',true):onErr('잘못된 PIN이에요');break;
    case'change-1':lockTempPin=lockPin;showLockScreen('change-2',true);break;
    case'change-2':lockPin===lockTempPin?(savePin(lockPin),backToSettings()):onErr('PIN이 일치하지 않아요');break;
    case'remove':lockPin===stored?(clearPin(),backToSettings()):onErr('잘못된 PIN이에요');break;
  }
}

function cancelLockFlow(){
  lockPin='';lockTempPin='';
  document.getElementById('lock-screen').style.display='none';
  renderSettings();
  document.getElementById('settings-bg').classList.add('open');
}

function lockApp(){
  document.getElementById('settings-bg').classList.remove('open');
  showLockScreen('unlock');
}

function openSettings(){
  renderSettings();
  document.getElementById('settings-bg').classList.add('open');
}

function closeSettingsBg(e){
  if(e.target===document.getElementById('settings-bg'))
    document.getElementById('settings-bg').classList.remove('open');
}

function renderSettings(){
  const hasPin=!!loadPin();
  const el=document.getElementById('settings-content');
  if(!el)return;
  el.innerHTML=hasPin?`
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">PIN이 설정되어 있어요.<br>앱을 열 때 PIN을 입력해야 해요.</p>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button onclick="document.getElementById('settings-bg').classList.remove('open');showLockScreen('change-old',true)" class="submit-btn" style="flex:1;padding:12px;font-size:14px;background:var(--bg3);color:var(--text)">PIN 변경</button>
      <button onclick="document.getElementById('settings-bg').classList.remove('open');showLockScreen('remove',true)" class="submit-btn" style="flex:1;padding:12px;font-size:14px;background:var(--red-light);color:var(--red-dark)">PIN 해제</button>
    </div>
    <button onclick="lockApp()" class="submit-btn" style="font-size:15px">🔒 지금 잠금</button>
  `:`
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px;line-height:1.6">4자리 PIN을 설정하면<br>앱 실행 시 잠금 화면이 표시돼요.</p>
    <button onclick="document.getElementById('settings-bg').classList.remove('open');showLockScreen('setpin-1',true)" class="submit-btn" style="font-size:15px">🔒 PIN 설정하기</button>
  `;
}

function checkAppLock(){if(loadPin())showLockScreen('unlock');}

document.getElementById('month-label').textContent=`${year}년 ${month}월`;
